name: wiki-v2 PR Quality

on:
  pull_request:
    paths:
      - "wiki-v2/**"
  push:
    branches:
      - "feat/wiki-v2"
    paths:
      - "wiki-v2/**"

jobs:
  quality:
    name: typecheck · lint · quality-check · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wiki-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wiki-v2/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Quality check (grep ban + content rules)
        run: npm run quality:check

      - name: Build (velite + next)
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
